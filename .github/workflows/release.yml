on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

name: Create Release

# Minimal default token scope; the job below escalates only what it needs.
permissions: read-all

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release for the pushed tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Use the hand-written CHANGELOG section for this version as the release
      # notes (it passes the docs-style check), falling back to auto-generated
      # notes only if the version has no entry.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v start="## [${ver}]" \
            'index($0,start)==1{c=1;next} c&&index($0,"## [")==1{exit} c{print}' \
            CHANGELOG.md > notes.md
          if [ -s notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "Release $GITHUB_REF_NAME" --notes-file notes.md
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "Release $GITHUB_REF_NAME" --generate-notes
          fi
