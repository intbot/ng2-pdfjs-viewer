name: Publish Package to npmjs
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

# Minimal default token scope; the job below escalates only what it needs.
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    # Gated by the 'release' environment: a required reviewer must approve the
    # run before it builds/publishes. Must match the Environment configured on
    # the npm trusted publisher for this package.
    environment: release
    permissions:
      # Required for npm trusted publishing (OIDC) and build provenance.
      # The short-lived OIDC token replaces the long-lived NPM_TOKEN secret.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Angular 22 / ng-packagr 22 / TypeScript 6.0 require Node >= 22.22 / 24.15
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      # Node 24 (node-version above) already bundles npm >= 11.5.1, which trusted
      # publishing + provenance require, so no separate npm upgrade step is needed.
      # (An `npm install -g npm@x` step can't be hash-pinned for Scorecard, so it's
      # removed rather than left as an unpinned dependency.)
      - name: Install dependencies
        working-directory: ./lib
        run: npm ci
      - name: Build
        working-directory: ./lib
        run: npm run build
      # Publishes via npm trusted publishing (OIDC) and attaches a build
      # provenance attestation (repo is public, so provenance is generated).
      # No NODE_AUTH_TOKEN: auth comes from the OIDC id-token above, once a
      # GitHub Actions trusted publisher is configured for this package on npm
      # (npmjs.com -> package settings -> Trusted Publisher). See CONTRIBUTING.md.
      - name: Publish to npm
        working-directory: ./lib/dist
        run: npm publish --provenance --access public
