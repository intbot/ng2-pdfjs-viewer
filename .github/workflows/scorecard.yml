# OpenSSF Scorecard — supply-chain health checks for the repository.
# Publishes results to the public OpenSSF dashboard and uploads SARIF to the
# repo's code-scanning so the Scorecard badge (in lib/README.md) resolves.
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    # Weekly, Mondays 07:00 UTC
    - cron: '0 7 * * 1'
  push:
    branches: ["master"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to code-scanning.
      security-events: write
      # Needed to publish results and get a badge (publish_results: true).
      id-token: write
      contents: read
      actions: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF REST API + enable the badge.
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: results.sarif
