# OpenSSF Scorecard — supply-chain health checks for the repository.
# Publishes results to the public OpenSSF dashboard and uploads SARIF to the
# repo's code-scanning so the Scorecard badge (in README.md) resolves.
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    # Weekly, Mondays 07:00 UTC
    - cron: '0 7 * * 1'
  push:
    branches: ["master"]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to code-scanning.
      security-events: write
      # Needed to publish results and get a badge (publish_results: true).
      id-token: write
      contents: read
      actions: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF REST API + enable the badge.
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
