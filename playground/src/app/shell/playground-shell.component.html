<div class="brand">
  <span class="mk" aria-hidden="true">
    <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pgmark" x1="0" y1="0" x2=".55" y2="1">
          <stop offset="0" stop-color="#E40035"/><stop offset=".24" stop-color="#F60A48"/>
          <stop offset=".352" stop-color="#F20755"/><stop offset=".494" stop-color="#DC087D"/>
          <stop offset=".745" stop-color="#9717E7"/><stop offset="1" stop-color="#6C00F5"/>
        </linearGradient>
      </defs>
      <g transform="translate(48 49) scale(1.26) translate(-48 -48)">
        <path d="M30 16 H55 L67 28 V49 C67 64 59 75 48 81 C37 75 29 64 29 49 V20 a4 4 0 0 1 1 -4 Z" fill="url(#pgmark)"/>
        <path d="M55 16 V28 H67 Z" fill="#fff" fill-opacity=".4"/>
        <path d="M42 16 h12 v24 l-6 -6 -6 6 Z" fill="#fff"/>
        <g stroke="#fff" stroke-width="2.6" stroke-linecap="round" opacity=".85">
          <line x1="38" y1="50" x2="58" y2="50"/><line x1="40" y1="58" x2="56" y2="58"/>
        </g>
      </g>
    </svg>
  </span>
  <span class="bt"><b>ng2-pdfjs-viewer</b><small>playground</small></span>
</div>

<header class="top">
  <nav class="crumb" aria-label="Breadcrumb">
    @if (currentGroup()) { <span>{{ currentGroup() }}</span><span class="sep">/</span> }
    <b>{{ currentTitle() }}</b>
  </nav>

  <button class="kbtn" type="button" (click)="palette.show()" aria-label="Open command palette">
    <span aria-hidden="true">⌕</span> <span class="klabel">Search features <span class="kbd">⌘K</span></span>
  </button>

  <span class="sp"></span>

  <label class="srcpick">
    <span class="visually-hidden">Sample PDF</span>
    <select class="ctl-input" (change)="onSampleChange($event)">
      @for (s of samples.samples; track s.id) {
        <option [value]="s.id" [selected]="s.id === samples.current().id">📄 {{ s.label }}</option>
      }
    </select>
  </label>

  <button class="ghost" type="button" (click)="theme.toggle()" [attr.aria-label]="'Switch to ' + (theme.mode() === 'dark' ? 'light' : 'dark') + ' theme'">
    {{ theme.mode() === 'dark' ? '☀' : '☾' }}
  </button>
  <a class="ghost" href="https://github.com/intbot/ng2-pdfjs-viewer" target="_blank" rel="noopener" aria-label="GitHub repository">★</a>
</header>

<aside class="side" aria-label="Feature navigation">
  @for (group of groups; track group) {
    <div class="glabel">{{ group }}</div>
    @for (f of featuresIn(group); track f.id) {
      <a class="n"
         [routerLink]="['/', f.route]"
         routerLinkActive="on"
         [routerLinkActiveOptions]="{ exact: f.route === '' }">
        <span class="ic" aria-hidden="true">{{ f.icon }}</span>
        <span class="nt">{{ f.title }}</span>
        @if (f.badge) { <span class="badge">{{ f.badge }}</span> }
      </a>
    }
  }
</aside>

<main class="main">
  <router-outlet />
</main>

<pg-command-palette />
